name: Update Gallery

on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate images list
        run: |
          find images -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.webp" \) | sort > images_list.txt
          echo "[" > images.json
          first=true
          while IFS= read -r file; do
            if [ "$first" = true ]; then first=false; else echo "," >> images.json; fi
            echo "  \"$file\"" >> images.json
          done < images_list.txt
          echo "]" >> images.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update gallery"
          git push
