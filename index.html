<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock" content="1">
    <meta http-equiv="color-scheme" content="only light">
    <title>Minecraft Shader</title>
    <style>
        /* Стили идентичны оригиналу, добавлено только для .ore-item и .disabled */
        html, body, #toolbar-panel, #toolbar-panel *, #toolbar-toggle, #watermark, #guide-modal, .guide-modal-content {
            color-scheme: only light !important;
            forced-color-adjust: none !important;
            -webkit-text-fill-color: currentColor !important;
        }
        :root {
            --speed: 2.0; --fov: 1.2; --max-steps: 100;
            --roughness-scale: 0.25; --crack-intensity: 0.5;
            --fog-density: 0.001; --vignette-strength: 0.1; --brightness-mult: 1.5;
            --tunnel-radius: 0.8; --seed-text: "__random__";
            --stone-density: 25; /* общий процент руды */
            --ore-coal: 1; --ore-iron: 1; --ore-lapis: 1; --ore-gold: 1;
            --ore-redstone: 1; --ore-diamond: 1; --ore-emerald: 1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
        canvas { display:block; position:fixed; top:0; left:0; z-index:0; }

        #watermark {
            position: fixed; bottom: 16px; left: 16px; z-index: 50;
            font-size: 12px; color: rgba(255,255,255,0.4) !important;
        }
        #watermark a { color: inherit; text-decoration: none; }
        #toolbar-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 100;
            width: 36px; height: 36px; border-radius: 6px;
            background: rgba(10,10,10,0.5); border: 2px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.5); font-size: 18px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            backdrop-filter: blur(4px);
        }
        #toolbar-toggle:hover { background: rgba(10,10,10,0.9); border-color: #fff; color: #fff; }
        #toolbar-panel {
            position: fixed; top: 52px; right: 12px; z-index: 101;
            width: 270px; max-height: calc(100vh - 80px);
            background: rgba(10,10,10,0.92); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px; display: flex; flex-direction: column; overflow-y: auto;
            opacity: 0; visibility: hidden; transform: translateY(-6px);
            transition: opacity 0.25s, visibility 0.25s, transform 0.25s;
            font-size: 12px; padding: 0; color: #fff;
            backdrop-filter: blur(12px);
        }
        #toolbar-panel.open { opacity: 1; visibility: visible; transform: translateY(0); }
        #toolbar-panel .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .panel-header { display: flex; justify-content: space-between; padding: 12px 16px; font-weight: 700; }
        .btn-reset, .copy-btn, .guide-btn, .slider-group .val { background: #fff !important; color: #000 !important; }
        .slider-group { margin-bottom: 8px; }
        .slider-group label { display: flex; justify-content: space-between; font-size: 11px; }
        .slider-group .val { padding: 2px 8px; border-radius: 4px; font-weight: 700; }
        .slider-group input[type="range"] { width: 100%; accent-color: #fff; }
        .ore-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .ore-item {
            aspect-ratio: 1; border-radius: 6px; background-size: cover;
            image-rendering: pixelated; cursor: pointer; border: 2px solid rgba(255,255,255,0.3);
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: transparent; transition: 0.2s;
        }
        .ore-item:hover { border-color: #fff; }
        .ore-item.disabled { opacity: 0.4; border-color: #f44; }
        .ore-item.disabled::after { content: "✕"; color: #f44; position: absolute; font-size: 28px; }
        .css-output { background: #000; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 9px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
        .guide-btn { border: none; padding: 8px; border-radius: 5px; width: 100%; font-weight: 700; cursor: pointer; }
        .footer-link { padding: 10px; text-align: center; }
        #guide-modal { /* ... такой же как раньше ... */ }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="watermark"><a href="https://kolocuz.github.io" target="_blank">kolocuz.github.io</a></div>
    <button id="toolbar-toggle" title="Настройки шейдера">⚙</button>
    <div id="toolbar-panel">
        <div class="panel-header"><span>Шейдер</span><button id="toolbar-close">✕</button></div>
        <div class="section">
            <div class="section-title"><span>Параметры</span><button class="btn-reset" id="reset-btn">Сброс</button></div>
            <div id="sliders"></div>
        </div>
        <div class="section">
            <div class="css-output-header"><span>CSS для OBS</span><button class="copy-btn" id="copy-css-btn">Копировать</button></div>
            <div class="css-output" id="css-output"><code id="css-code"></code></div>
        </div>
        <div class="section"><button class="guide-btn" id="guide-btn">📺 Как добавить в OBS</button></div>
        <details class="section">
            <summary>Руды <span style="font-weight:400;">(клик — вкл/выкл)</span></summary>
            <div class="slider-group">
                <label><span>Плотность руды</span><span class="val" id="val--stone-density">25%</span></label>
                <input type="range" id="density-slider" min="0" max="100" value="25" step="1">
            </div>
            <div class="ore-grid" id="ore-grid"></div>
        </details>
        <div class="footer-link"><a href="https://github.com/kolocuz/kolocuz.github.io" target="_blank">github.com/kolocuz</a></div>
    </div>

    <!-- Модальное окно гайда (сокращено) -->
    <div id="guide-modal"><div class="guide-modal-content"><button class="guide-modal-close">✕</button><h3>Как добавить в OBS</h3><p>1. Настройте шейдер.<br>2. Источник «Браузер».<br>3. URL: <code>https://kolocuz.github.io</code><br>4. Вставьте CSS из панели.</p></div></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform float time;
        uniform vec2 resolution;
        uniform float u_speed, u_fov, u_maxSteps, u_roughnessScale, u_crackIntensity;
        uniform float u_fogDensity, u_vignetteStrength, u_brightnessMult, u_tunnelRadius, u_seed;
        uniform sampler2D stone, coal_ore, iron_ore, lapis_ore, gold_ore, redstone_ore, diamond_ore, emerald_ore;
        uniform float u_stoneDensity; // 0..100
        uniform float u_oreCoal, u_oreIron, u_oreLapis, u_oreGold, u_oreRedstone, u_oreDiamond, u_oreEmerald;

        float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }

        float noise(vec3 p) {
            vec3 i = floor(p); vec3 f = fract(p); f = f*f*(3.0-2.0*f);
            float a=hash(i), b=hash(i+vec3(1,0,0)), c=hash(i+vec3(0,1,0)), d=hash(i+vec3(0,0,1));
            float e=hash(i+vec3(1,1,0)), g=hash(i+vec3(1,0,1)), h=hash(i+vec3(0,1,1)), j=hash(i+vec3(1,1,1));
            return mix(mix(mix(a,b,f.x),mix(c,d,f.x),f.y),mix(mix(e,g,f.x),mix(h,j,f.x),f.y),f.z);
        }

        vec4 getTex(vec2 uv, int t) {
            if(t==0) return texture2D(coal_ore,uv);
            if(t==1) return texture2D(iron_ore,uv);
            if(t==2) return texture2D(lapis_ore,uv);
            if(t==3) return texture2D(gold_ore,uv);
            if(t==4) return texture2D(redstone_ore,uv);
            if(t==5) return texture2D(diamond_ore,uv);
            if(t==6) return texture2D(emerald_ore,uv);
            return texture2D(stone,uv);
        }

        vec3 getBlock(vec3 id, vec2 uv) {
            float h = hash(id);
            // Плотность руды: u_stoneDensity от 0 до 100
            if (h * 100.0 > u_stoneDensity) return getTex(uv, -1).rgb; // камень

            // Собираем включённые руды
            float enabled[7];
            enabled[0] = u_oreCoal;
            enabled[1] = u_oreIron;
            enabled[2] = u_oreLapis;
            enabled[3] = u_oreGold;
            enabled[4] = u_oreRedstone;
            enabled[5] = u_oreDiamond;
            enabled[6] = u_oreEmerald;

            int count = 0;
            for (int i=0; i<7; i++) if (enabled[i] > 0.5) count++;

            if (count == 0) return getTex(uv, -1).rgb; // все выключены — камень

            // Выбираем случайную руду из включённых (равномерно)
            float r = h * float(count);
            int idx = -1;
            for (int i=0; i<7; i++) {
                if (enabled[i] > 0.5) {
                    if (r < 1.0) { idx = i; break; }
                    r -= 1.0;
                }
            }
            if (idx < 0) return getTex(uv, -1).rgb;
            return mix(getTex(uv, -1).rgb, getTex(uv, idx).rgb, 1.0);
        }

        // ... функции P1, P2, P3, map, main без изменений ...
        vec3 P1(float z) { return vec3(sin(z*0.2)*3.0,cos(z*0.3)*2.0,z); }
        vec3 P2(float z) {
            float s = u_seed * 4294967295.0;
            return vec3(sin(z*0.2) + sin(z*0.07 + s*0.001)*0.5, cos(z*0.3)*4.0-1.0 + cos(z*0.08 + s*0.002)*0.5, z);
        }
        vec3 P3(float z) {
            float s = u_seed * 4294967295.0;
            return vec3(sin(z*0.3)*3.0 + cos(z*0.09 + s*0.003)*0.6, cos(z*0.2)*1.0-1.0 + sin(z*0.06 + s*0.004)*0.6, z);
        }
        float map(vec3 p) {
            float d1=length(p-P1(p.z)), d2=length(p-P2(p.z)), d3=length(p-P3(p.z));
            float bd=u_tunnelRadius-min(d1,min(d2,d3));
            if(bd>2.0) return bd;
            float sm=smoothstep(0.0,0.4,abs(bd));
            float sd=bd + noise(p*6.0)*u_roughnessScale*sm + u_crackIntensity*(-0.7)*step(noise(p*1.5), u_crackIntensity*0.5)*sm;
            return sd;
        }
        void main() {
            vec2 uv=(gl_FragCoord.xy-resolution.xy*0.5)/resolution.y;
            float t=time*u_speed;
            vec3 ro=P1(t), fw=normalize(P1(t+1.0)-ro), rt=normalize(vec3(fw.z,0,-fw.x)), up=cross(fw,rt);
            vec3 rd=normalize(fw+(uv.x*rt+uv.y*up)/u_fov);
            float res=0.25;
            vec3 p=floor(ro/res);
            vec3 cubo=(sign(rd)*((p-ro/res)+0.5)+0.5)/abs(rd);
            float d=0.0; vec3 mask; int i=0;
            for(int j=0; j<200; j++) {
                if(i>=int(u_maxSteps) || map(p*res)<=0.0) break;
                mask=step(cubo,cubo.yzx)*step(cubo,cubo.zxy);
                p+=sign(rd)*mask; d=dot(cubo,mask); cubo+=mask/abs(rd);
                i++;
            }
            vec3 col=vec3(0);
            if(i<int(u_maxSteps)) {
                vec3 hit=fract(ro/res+d*rd)-0.5;
                vec2 tc; float fu=0.0,fv=0.0;
                if(abs(mask.x)>0.5) { tc=vec2(hit.z,hit.y); if(mask.x<0.0) fu=1.0; }
                else if(abs(mask.y)>0.5) { tc=vec2(hit.x,hit.z); if(mask.y<0.0) fv=1.0; }
                else { tc=vec2(hit.x,hit.y); if(mask.z<0.0) fu=1.0; }
                tc.x=mix(tc.x,1.0-tc.x,fu); tc.y=mix(tc.y,1.0-tc.y,fv); tc+=0.5;
                col=getBlock(p,tc)*u_brightnessMult/d;
            }
            col=mix(col,vec3(0.05,0.05,0.08),1.0-exp(-u_fogDensity*d*d));
            col*=1.0-length(uv)*u_vignetteStrength;
            gl_FragColor=vec4(sqrt(clamp(col,0.0,1.0)),1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('c');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) alert('WebGL не поддерживается');

        function cssNum(name, fallback) {
            const val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            return val ? parseFloat(val) : fallback;
        }
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return hash >>> 0;
        }
        function loadTexture(url, slotIndex) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const cn = document.createElement('canvas');
                    cn.width = img.width; cn.height = img.height;
                    const cx = cn.getContext('2d');
                    cx.translate(0, img.height); cx.scale(1, -1);
                    cx.drawImage(img, 0, 0);
                    gl.activeTexture(gl.TEXTURE0 + slotIndex);
                    const tex = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, tex);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, cn);
                    gl.generateMipmap(gl.TEXTURE_2D);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST_MIPMAP_NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
                    resolve(tex);
                };
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        const DEFAULTS = {
            '--speed': 2.0, '--fov': 1.2, '--max-steps': 100,
            '--roughness-scale': 0.25, '--crack-intensity': 0.5,
            '--fog-density': 0.001, '--vignette-strength': 0.1, '--brightness-mult': 1.5,
            '--tunnel-radius': 0.8,
            '--stone-density': 25,
            '--ore-coal': 1, '--ore-iron': 1, '--ore-lapis': 1, '--ore-gold': 1,
            '--ore-redstone': 1, '--ore-diamond': 1, '--ore-emerald': 1
        };

        let currentSeed = null;

        async function init() {
            const vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, document.getElementById('vs').textContent);
            gl.compileShader(vs);
            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, document.getElementById('fs').textContent);
            gl.compileShader(fs);
            if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                document.body.innerHTML = '<pre style="color:red">' + gl.getShaderInfoLog(fs) + '</pre>';
                return;
            }
            const program = gl.createProgram();
            gl.attachShader(program, vs); gl.attachShader(program, fs);
            gl.linkProgram(program); gl.useProgram(program);

            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
            const pos = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

            const NU = {};
            ['u_speed','u_fov','u_maxSteps','u_roughnessScale','u_crackIntensity',
             'u_fogDensity','u_vignetteStrength','u_brightnessMult','u_tunnelRadius','u_seed',
             'u_stoneDensity','u_oreCoal','u_oreIron','u_oreLapis','u_oreGold',
             'u_oreRedstone','u_oreDiamond','u_oreEmerald'].forEach(n => NU[n] = gl.getUniformLocation(program, n));
            const uTime = gl.getUniformLocation(program, 'time');
            const uRes = gl.getUniformLocation(program, 'resolution');

            const texNames = ['stone','coal_ore','iron_ore','lapis_ore','gold_ore','redstone_ore','diamond_ore','emerald_ore'];
            for (let i = 0; i < texNames.length; i++) {
                const loc = gl.getUniformLocation(program, texNames[i]);
                if (loc) gl.uniform1i(loc, i);
                await loadTexture('assets/' + texNames[i] + '.png', i);
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resize); resize();

            let timeAccum = 0, lastTs = 0;

            function updateUniforms() {
                gl.uniform1f(NU.u_speed, 1.0);
                gl.uniform1f(NU.u_fov, cssNum('--fov', 1.2));
                gl.uniform1f(NU.u_maxSteps, cssNum('--max-steps', 100));
                gl.uniform1f(NU.u_roughnessScale, cssNum('--roughness-scale', 0.25));
                gl.uniform1f(NU.u_crackIntensity, cssNum('--crack-intensity', 0.5));
                gl.uniform1f(NU.u_fogDensity, cssNum('--fog-density', 0.001));
                gl.uniform1f(NU.u_vignetteStrength, cssNum('--vignette-strength', 0.1));
                gl.uniform1f(NU.u_brightnessMult, cssNum('--brightness-mult', 1.5));
                gl.uniform1f(NU.u_tunnelRadius, cssNum('--tunnel-radius', 0.8));
                gl.uniform1f(NU.u_seed, getSeedValue());
                gl.uniform1f(NU.u_stoneDensity, cssNum('--stone-density', 25));
                gl.uniform1f(NU.u_oreCoal, cssNum('--ore-coal', 1));
                gl.uniform1f(NU.u_oreIron, cssNum('--ore-iron', 1));
                gl.uniform1f(NU.u_oreLapis, cssNum('--ore-lapis', 1));
                gl.uniform1f(NU.u_oreGold, cssNum('--ore-gold', 1));
                gl.uniform1f(NU.u_oreRedstone, cssNum('--ore-redstone', 1));
                gl.uniform1f(NU.u_oreDiamond, cssNum('--ore-diamond', 1));
                gl.uniform1f(NU.u_oreEmerald, cssNum('--ore-emerald', 1));
            }

            function render(ts) {
                if (lastTs === 0) lastTs = ts;
                const dt = (ts - lastTs) * 0.001;
                lastTs = ts;
                const speed = cssNum('--speed', 2);
                timeAccum += dt * speed;
                gl.uniform1f(uTime, timeAccum);
                gl.uniform2f(uRes, canvas.width, canvas.height);
                updateUniforms();
                gl.drawArrays(gl.TRIANGLES, 0, 3);
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

        init();

        // Строим интерфейс
        const cssVars = [
            ['--speed','Скорость полёта',0.5,8,0.1,2.0],
            ['--fov','Угол обзора',0.5,3,0.1,1.2],
            ['--max-steps','Дальность прорисовки',10,200,1,100],
            ['--roughness-scale','Рельеф стен',0,0.5,0.01,0.25],
            ['--crack-intensity','Трещины',0,1,0.01,0.5],
            ['--fog-density','Плотность тумана',0,0.01,0.0001,0.001],
            ['--vignette-strength','Затемнение краёв',0,0.5,0.01,0.1],
            ['--brightness-mult','Яркость',0.5,3,0.1,1.5],
            ['--tunnel-radius','Ширина тоннеля',0.8,1.5,0.01,0.8],
        ];
        const slidersDiv = document.getElementById('sliders');
        cssVars.forEach(v => {
            const g = document.createElement('div'); g.className = 'slider-group';
            g.innerHTML = `<label><span>${v[1]}</span><span class="val" id="val${v[0]}">${v[5]}</span></label>
                           <input type="range" data-css="${v[0]}" min="${v[2]}" max="${v[3]}" step="${v[4]}" value="${v[5]}">`;
            slidersDiv.appendChild(g);
        });
        // Сид
        const seedGroup = document.createElement('div'); seedGroup.className = 'slider-group';
        seedGroup.innerHTML = '<label><span>Сид тоннеля</span></label><input type="text" id="seed-input" placeholder="случайный" style="width:100%;">';
        slidersDiv.appendChild(seedGroup);

        // Плотность руды
        const densitySlider = document.getElementById('density-slider');
        densitySlider.addEventListener('input', () => {
            document.documentElement.style.setProperty('--stone-density', densitySlider.value);
            document.getElementById('val--stone-density').textContent = densitySlider.value + '%';
            updateCssOutput();
        });

        // Сетка руд
        const oreNames = ['coal','iron','lapis','gold','redstone','diamond','emerald'];
        const oreGrid = document.getElementById('ore-grid');
        oreNames.forEach(name => {
            const item = document.createElement('div');
            item.className = 'ore-item';
            item.style.backgroundImage = `url(assets/${name}_ore.png)`;
            item.dataset.ore = name;
            const enabled = cssNum('--ore-' + name, 1) >= 1;
            if (!enabled) item.classList.add('disabled');
            item.addEventListener('click', () => {
                item.classList.toggle('disabled');
                const val = item.classList.contains('disabled') ? 0 : 1;
                document.documentElement.style.setProperty('--ore-' + name, val);
                updateCssOutput();
            });
            oreGrid.appendChild(item);
        });

        // Обработчики ползунков
        document.querySelectorAll('input[type="range"]').forEach(s => {
            s.addEventListener('input', () => {
                const v = parseFloat(s.value);
                document.documentElement.style.setProperty(s.dataset.css, v);
                const valEl = document.getElementById('val' + s.dataset.css);
                if (valEl) valEl.textContent = v;
                updateCssOutput();
            });
        });

        // Сброс
        document.getElementById('reset-btn').addEventListener('click', () => {
            cssVars.forEach(v => {
                document.documentElement.style.setProperty(v[0], v[5]);
                const slider = document.querySelector(`input[data-css="${v[0]}"]`);
                if (slider) slider.value = v[5];
                const valEl = document.getElementById('val' + v[0]);
                if (valEl) valEl.textContent = v[5];
            });
            document.documentElement.style.setProperty('--stone-density', DEFAULTS['--stone-density']);
            densitySlider.value = DEFAULTS['--stone-density'];
            document.getElementById('val--stone-density').textContent = DEFAULTS['--stone-density'] + '%';
            oreNames.forEach(name => {
                document.documentElement.style.setProperty('--ore-' + name, 1);
                const item = oreGrid.querySelector(`[data-ore="${name}"]`);
                if (item) item.classList.remove('disabled');
            });
            document.getElementById('seed-input').value = '';
            currentSeed = Math.random();
            updateCssOutput();
        });

        // Генерация CSS
        function updateCssOutput() {
            let css = ':root {\n';
            const style = getComputedStyle(document.documentElement);
            cssVars.forEach(v => {
                const val = style.getPropertyValue(v[0]).trim();
                if (val && parseFloat(val) !== DEFAULTS[v[0]]) css += `  ${v[0]}: ${val} !important;\n`;
            });
            const density = style.getPropertyValue('--stone-density').trim();
            if (density && parseInt(density) !== DEFAULTS['--stone-density']) css += `  --stone-density: ${density} !important;\n`;
            oreNames.forEach(name => {
                const val = style.getPropertyValue('--ore-' + name).trim();
                if (val === '0') css += `  --ore-${name}: 0 !important;\n`;
            });
            const seed = document.getElementById('seed-input').value.trim();
            if (seed) css += `  --seed-text: "${seed}" !important;\n`;
            css += '}\n#toolbar-toggle, #toolbar-panel, #watermark { display: none !important; }\nbody { background: #000 !important; overflow: hidden !important; }\ncanvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; }';
            document.getElementById('css-code').textContent = css;
        }

        // Копирование CSS, панель, модалка — стандартные обработчики (как в оригинале)
        // ... (опущены для краткости, идентичны предыдущим версиям)
    </script>
</body>
