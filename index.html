<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulkanLight — Галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            color: #e0e0e0;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6600, #ff2200);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card .info {
            padding: 1rem;
        }

        .card .filename {
            font-size: 0.85rem;
            color: #ff884d;
            font-family: monospace;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #2a2a2a;
            color: #555;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 VulkanLight</h1>
    <p>Галерея скриншотов | Кликни для увеличения</p>
</div>

<div class="gallery" id="gallery"></div>

<div class="footer">
    VulkanLight — легковесная сборка на VulkanMod
</div>

<div class="modal" id="modal">
    <img id="modalImage" alt="Preview">
</div>

<script>
    // 📸 Список твоих фото — ДОБАВЛЯЙ СЮДА!
    // Формат: "папка/имя_файла.png" или просто "имя_файла.png"
    const images = [
        // Примеры (замени на свои):
        "images/скрин1.png",
        "images/скрин2.jpg",
        "images/сравнение/sodium.png",
        "images/сравнение/vulkan.png"
    ];

    // Функция получения имени файла из пути
    function getFileName(path) {
        return path.split('/').pop();
    }

    // Рендер галереи
    function renderGallery() {
        const gallery = document.getElementById('gallery');
        
        if (images.length === 0) {
            gallery.innerHTML = '<div style="text-align:center;padding:3rem;">📭 Нет фото. Добавь пути в массив images</div>';
            return;
        }
        
        gallery.innerHTML = images.map(imgPath => `
            <div class="card" data-url="${imgPath}">
                <img src="${imgPath}" loading="lazy" alt="${getFileName(imgPath)}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23333%22%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22%3E❌%3C/text%3E%3C/svg%3E'">
                <div class="info">
                    <div class="filename">📷 ${getFileName(imgPath)}</div>
                </div>
            </div>
        `).join('');
        
        // Вешаем обработчики
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.dataset.url;
                openModal(url);
            });
        });
    }
    
    function openModal(imageUrl) {
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');
        modalImage.src = imageUrl;
        modal.classList.add('active');
    }
    
    function closeModal() {
        const modal = document.getElementById('modal');
        modal.classList.remove('active');
    }
    
    // Запуск
    renderGallery();
    
    // Закрытие модального окна
    document.getElementById('modal').addEventListener('click', closeModal);
    document.getElementById('modalImage').addEventListener('click', (e) => e.stopPropagation());
</script>
</body>
</html>
