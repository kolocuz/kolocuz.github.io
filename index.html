<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Shader</title>
    <style>
        :root {
            --speed: 2.0; --fov: 1.2; --max-steps: 100; --stone-threshold: 5;
            --roughness-scale: 0.25; --crack-chance: 0.15; --hole-depth: -0.35;
            --fog-density: 0.001; --vignette-strength: 0.1; --brightness-mult: 1.5;
            --tunnel-radius: 1.5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:system-ui,sans-serif; }
        canvas { display:block; position:fixed; top:0; left:0; z-index:0; }

        #watermark {
            position: fixed; bottom: 16px; left: 16px; z-index: 50;
            color: rgba(255,255,255,0.2); font-size: 11px; pointer-events: auto;
            transition: opacity 0.3s; user-select: none;
        }
        #watermark a { color: rgba(255,255,255,0.2); text-decoration: none; }
        #watermark a:hover { color: rgba(255,255,255,0.5); }
        #watermark.hidden { opacity: 0; }

        #toolbar-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 100;
            width: 32px; height: 32px; border-radius: 6px;
            background: rgba(0,0,0,0.4); border: none; color: rgba(255,255,255,0.5);
            font-size: 16px; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
            transition: opacity 0.4s, background 0.2s, color 0.2s;
            opacity: 1; backdrop-filter: blur(4px);
        }
        #toolbar-toggle.hidden { opacity: 0; pointer-events: none; }
        #toolbar-toggle:hover { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.9); }

        #toolbar-panel {
            position: fixed; top: 52px; right: 12px; z-index: 101;
            width: 260px; max-height: calc(100vh - 80px);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            border-radius: 8px; display: flex; flex-direction: column; overflow-y: auto;
            opacity: 0; visibility: hidden; transform: translateY(-6px);
            transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
            color: #ccc; font-size: 12px; padding: 10px 0;
        }
        #toolbar-panel.open { opacity: 1; visibility: visible; transform: translateY(0); }
        #toolbar-panel::-webkit-scrollbar { width: 2px; }
        #toolbar-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 1px; }

        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 14px 10px; font-weight: 600; color: rgba(255,255,255,0.7); font-size: 13px;
        }
        .panel-header button {
            background: none; border: none; color: rgba(255,255,255,0.3); font-size: 16px;
            cursor: pointer; padding: 0 4px; line-height: 1;
        }
        .panel-header button:hover { color: rgba(255,255,255,0.7); }

        .section { padding: 6px 14px; border-top: 1px solid rgba(255,255,255,0.04); }
        .section-title {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; color: rgba(255,255,255,0.3); margin-bottom: 6px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .slider-group { margin-bottom: 2px; }
        .slider-group label {
            display: flex; justify-content: space-between; font-size: 10px;
            color: rgba(255,255,255,0.4); margin-bottom: 2px;
        }
        .slider-group .val {
            font-size: 9px; color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px;
        }
        .slider-group input[type="range"] {
            width: 100%; height: 3px; accent-color: rgba(255,255,255,0.8);
            appearance: none; background: rgba(255,255,255,0.08); border-radius: 2px; outline: none;
        }

        .toggle-group {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px;
        }
        .toggle-group input[type="checkbox"] {
            width: 28px; height: 16px; appearance: none;
            background: rgba(255,255,255,0.15); border-radius: 8px; position: relative;
            cursor: pointer; transition: background 0.2s;
        }
        .toggle-group input[type="checkbox"]::before {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 12px; height: 12px; background: #fff;
            border-radius: 50%; transition: transform 0.2s;
        }
        .toggle-group input[type="checkbox"]:checked { background: rgba(255,255,255,0.4); }
        .toggle-group input[type="checkbox"]:checked::before { transform: translateX(12px); }

        .btn-reset {
            background: none; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 2px 8px; border-radius: 4px; cursor: pointer;
            font-size: 9px; transition: all 0.2s;
        }
        .btn-reset:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.3); }

        .css-output {
            background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.5);
            padding: 6px; border-radius: 4px; font-family: monospace; font-size: 8px;
            max-height: 100px; overflow-y: auto; white-space: pre-wrap;
        }
        .css-output-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px;
        }
        .copy-btn {
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
            border: none; padding: 2px 6px; border-radius: 3px; font-size: 9px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .copy-btn.copied { background: rgba(76,175,80,0.5); color: #fff; }

        details.section { padding: 6px 14px; }
        details summary {
            cursor: pointer; outline: none; font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.3px; color: rgba(255,255,255,0.3);
            margin-bottom: 4px;
        }
        details summary:hover { color: rgba(255,255,255,0.6); }

        .texture-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .texture-item {
            aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.06);
            border-radius: 3px; background-size: cover; background-position: center;
            image-rendering: pixelated; background-color: #111;
        }

        @media (max-width: 440px) {
            #toolbar-panel { width: calc(100vw - 20px); right: 6px; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="watermark"><a href="https://kolocuz.github.io" target="_blank">kolocuz.github.io</a></div>

    <button id="toolbar-toggle" title="Настройки шейдера">⚙</button>
    <div id="toolbar-panel">
        <div class="panel-header">
            <span>Шейдер</span>
            <button id="toolbar-close" title="Закрыть">✕</button>
        </div>
        <div class="section">
            <div class="section-title">
                <span>Параметры</span>
                <button class="btn-reset" id="reset-btn">Сброс</button>
            </div>
            <div id="sliders"></div>
            <div class="toggle-group">
                <span>Вотермарка</span>
                <input type="checkbox" id="watermark-toggle" checked>
            </div>
        </div>
        <div class="section">
            <div class="css-output-header">
                <span class="section-title" style="margin-bottom:0;">CSS для OBS</span>
                <button class="copy-btn" id="copy-css-btn">Копировать</button>
            </div>
            <div class="css-output" id="css-output">
                <code id="css-code"></code>
            </div>
        </div>
        <details class="section">
            <summary>Текстуры</summary>
            <div class="texture-grid" id="texture-grid"></div>
        </details>
    </div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform float time;
        uniform vec2 resolution;
        uniform float u_speed;
        uniform float u_fov;
        uniform float u_maxSteps;
        uniform float u_stoneThreshold;
        uniform float u_roughnessScale;
        uniform float u_crackChance;
        uniform float u_holeDepth;
        uniform float u_fogDensity;
        uniform float u_vignetteStrength;
        uniform float u_brightnessMult;
        uniform float u_tunnelRadius;
        uniform sampler2D stone;
        uniform sampler2D coal_ore;
        uniform sampler2D iron_ore;
        uniform sampler2D lapis_ore;
        uniform sampler2D gold_ore;
        uniform sampler2D redstone_ore;
        uniform sampler2D diamond_ore;
        uniform sampler2D emerald_ore;

        float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }

        float noise(vec3 p) {
            vec3 i = floor(p); vec3 f = fract(p); f = f*f*(3.0-2.0*f);
            float a=hash(i), b=hash(i+vec3(1,0,0)), c=hash(i+vec3(0,1,0)), d=hash(i+vec3(0,0,1));
            float e=hash(i+vec3(1,1,0)), g=hash(i+vec3(1,0,1)), h=hash(i+vec3(0,1,1)), j=hash(i+vec3(1,1,1));
            return mix(mix(mix(a,b,f.x),mix(c,d,f.x),f.y),mix(mix(e,g,f.x),mix(h,j,f.x),f.y),f.z);
        }

        vec4 getTex(vec2 uv, int t) {
            if(t<0) return texture2D(stone,uv);
            if(t==0) return texture2D(coal_ore,uv);
            if(t==1) return texture2D(iron_ore,uv);
            if(t==2) return texture2D(lapis_ore,uv);
            if(t==3) return texture2D(gold_ore,uv);
            if(t==4) return texture2D(redstone_ore,uv);
            if(t==5) return texture2D(diamond_ore,uv);
            if(t==6) return texture2D(emerald_ore,uv);
            return vec4(1,0,1,1);
        }

        vec3 getBlock(vec3 id, vec2 uv) {
            float h=hash(id);
            if(h > u_stoneThreshold) return getTex(uv,-1).rgb;
            float r=hash(id+vec3(5,7,11));
            int o=0;
            if(r<0.45) o=0; else if(r<0.70) o=1; else if(r<0.80) o=2; else if(r<0.87) o=3; else if(r<0.94) o=4; else if(r<0.98) o=5; else o=6;
            return mix(getTex(uv,-1).rgb, getTex(uv,o).rgb, 1.0);
        }

        vec3 P1(float z) { return vec3(sin(z*0.2)*3.0,cos(z*0.3)*2.0,z); }
        vec3 P2(float z) { return vec3(sin(z*0.2),cos(z*0.3)*4.0-1.0,z); }
        vec3 P3(float z) { return vec3(sin(z*0.3)*3.0,cos(z*0.2)*1.0-1.0,z); }

        float map(vec3 p) {
            float d1=length(p-P1(p.z)), d2=length(p-P2(p.z)), d3=length(p-P3(p.z));
            float bd=u_tunnelRadius-min(d1,min(d2,d3));
            if(bd>2.0) return bd;
            float zPos=p.z*0.5;
            float sd=bd*(1.0+sin(zPos)*0.005+cos(zPos*0.7)*0.0025);
            float sm=smoothstep(0.0,0.4,abs(bd));
            sd+=noise(p*6.0)*u_roughnessScale*sm;
            sd+=u_holeDepth*step(noise(p*1.5),u_crackChance)*sm;
            return sd;
        }

        void main() {
            vec2 uv=(gl_FragCoord.xy-resolution.xy*0.5)/resolution.y;
            float t=time*u_speed;
            vec3 ro=P1(t), fw=normalize(P1(t+1.0)-ro), rt=normalize(vec3(fw.z,0,-fw.x)), up=cross(fw,rt);
            vec3 rd=normalize(fw+(uv.x*rt+uv.y*up)/u_fov);
            float res=0.5;
            vec3 p=floor(ro/res);
            vec3 cubo=(sign(rd)*((p-ro/res)+0.5)+0.5)/abs(rd);
            float d=0.0; vec3 mask; int i=0;
            for(int j=0; j<200; j++) {
                if(i>=int(u_maxSteps) || map(p*res)<=0.0) break;
                mask=step(cubo,cubo.yzx)*step(cubo,cubo.zxy);
                p+=sign(rd)*mask; d=dot(cubo,mask); cubo+=mask/abs(rd);
                i++;
            }
            vec3 col=vec3(0);
            if(i<int(u_maxSteps)) {
                vec3 hit=fract(ro/res+d*rd)-0.5;
                vec2 tc; float fu=0.0,fv=0.0;
                if(abs(mask.x)>0.5) { tc=vec2(hit.z,hit.y); if(mask.x<0.0) fu=1.0; }
                else if(abs(mask.y)>0.5) { tc=vec2(hit.x,hit.z); if(mask.y<0.0) fv=1.0; }
                else { tc=vec2(hit.x,hit.y); if(mask.z<0.0) fu=1.0; }
                tc.x=mix(tc.x,1.0-tc.x,fu); tc.y=mix(tc.y,1.0-tc.y,fv); tc+=0.5;
                col=getBlock(p,tc)*u_brightnessMult/d;
            }
            col=mix(col,vec3(0.05,0.05,0.08),1.0-exp(-u_fogDensity*d*d));
            col*=1.0-length(uv)*u_vignetteStrength;
            gl_FragColor=vec4(sqrt(clamp(col,0.0,1.0)),1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('c');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) alert('WebGL не поддерживается');

        function cssNum(name, fallback) {
            const val = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            return val ? parseFloat(val) : fallback;
        }

        function loadTexture(url, slotIndex) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.onload = function() {
                    var cn = document.createElement('canvas');
                    cn.width = img.width;
                    cn.height = img.height;
                    var cx = cn.getContext('2d');
                    cx.translate(0, img.height);
                    cx.scale(1, -1);
                    cx.drawImage(img, 0, 0);
                    
                    gl.activeTexture(gl.TEXTURE0 + slotIndex);
                    var tex = gl.createTexture();
                    gl.bindTexture(gl.TEXTURE_2D, tex);
                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, cn);
                    gl.generateMipmap(gl.TEXTURE_2D);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST_MIPMAP_NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
                    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
                    resolve(tex);
                };
                img.onerror = function() { resolve(null); };
                img.src = url;
            });
        }

        async function init() {
            var vs = gl.createShader(gl.VERTEX_SHADER);
            gl.shaderSource(vs, document.getElementById('vs').textContent);
            gl.compileShader(vs);

            var fs = gl.createShader(gl.FRAGMENT_SHADER);
            gl.shaderSource(fs, document.getElementById('fs').textContent);
            gl.compileShader(fs);

            if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                document.body.innerHTML = '<pre style="color:red;padding:20px;">' + gl.getShaderInfoLog(fs) + '</pre>';
                return;
            }

            var program = gl.createProgram();
            gl.attachShader(program, vs); gl.attachShader(program, fs);
            gl.linkProgram(program); gl.useProgram(program);

            var buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,3,-1,-1,3]), gl.STATIC_DRAW);
            var pos = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

            var NU = {};
            ['u_speed','u_fov','u_maxSteps','u_stoneThreshold',
             'u_roughnessScale','u_crackChance','u_holeDepth','u_fogDensity','u_vignetteStrength',
             'u_brightnessMult','u_tunnelRadius'].forEach(function(n) {
                NU[n] = gl.getUniformLocation(program, n);
            });
            var uTime = gl.getUniformLocation(program, 'time');
            var uRes = gl.getUniformLocation(program, 'resolution');

            var texNames = ['stone','coal_ore','iron_ore','lapis_ore','gold_ore','redstone_ore','diamond_ore','emerald_ore'];
            
            for (var i = 0; i < texNames.length; i++) {
                var loc = gl.getUniformLocation(program, texNames[i]);
                if (loc) gl.uniform1i(loc, i);
                await loadTexture('assets/' + texNames[i] + '.png', i);
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }
            window.addEventListener('resize', resize); resize();

            var timeAccum = 0;
            var lastTs = 0;
            var currentSpeed = cssNum('--speed', 2);

            function render(ts) {
                if (lastTs === 0) lastTs = ts;
                var dt = (ts - lastTs) * 0.001;
                lastTs = ts;
                
                var newSpeed = cssNum('--speed', 2);
                timeAccum += dt * currentSpeed;
                currentSpeed = newSpeed;
                
                gl.uniform1f(uTime, timeAccum);
                gl.uniform2f(uRes, canvas.width, canvas.height);
                gl.uniform1f(NU.u_speed, 1.0);
                gl.uniform1f(NU.u_fov, cssNum('--fov', 1.2));
                gl.uniform1f(NU.u_maxSteps, cssNum('--max-steps', 100));
                gl.uniform1f(NU.u_stoneThreshold, cssNum('--stone-threshold', 5) / 100);
                gl.uniform1f(NU.u_roughnessScale, cssNum('--roughness-scale', 0.25));
                gl.uniform1f(NU.u_crackChance, cssNum('--crack-chance', 0.15));
                gl.uniform1f(NU.u_holeDepth, cssNum('--hole-depth', -0.35));
                gl.uniform1f(NU.u_fogDensity, cssNum('--fog-density', 0.001));
                gl.uniform1f(NU.u_vignetteStrength, cssNum('--vignette-strength', 0.1));
                gl.uniform1f(NU.u_brightnessMult, cssNum('--brightness-mult', 1.5));
                gl.uniform1f(NU.u_tunnelRadius, cssNum('--tunnel-radius', 1.5));
                gl.drawArrays(gl.TRIANGLES, 0, 3);
                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

        init();

        var cssVars = [
            ['--speed','Скорость полёта',0.1,10,0.1,2.0],
            ['--fov','Угол обзора',0.5,3,0.1,1.2],
            ['--max-steps','Дальность прорисовки',10,200,1,100],
            ['--stone-threshold','Количество руды',0,10,1,5],
            ['--roughness-scale','Рельеф стен',0,0.5,0.01,0.25],
            ['--crack-chance','Частота трещин',0,0.5,0.01,0.15],
            ['--hole-depth','Глубина трещин',-1,0,0.01,-0.35],
            ['--fog-density','Плотность тумана',0,0.01,0.0001,0.001],
            ['--vignette-strength','Затемнение краёв',0,0.5,0.01,0.1],
            ['--brightness-mult','Яркость',0.5,3,0.1,1.5],
            ['--tunnel-radius','Ширина тоннеля',2,3,0.1,1.5],
        ];
        var texNames = ['stone','coal_ore','iron_ore','lapis_ore','gold_ore','redstone_ore','diamond_ore','emerald_ore'];

        var slidersDiv = document.getElementById('sliders');
        cssVars.forEach(function(v) {
            var g = document.createElement('div'); g.className = 'slider-group';
            g.innerHTML = '<label><span>'+v[1]+'</span><span class="val" id="val'+v[0]+'">'+v[5]+'</span></label><input type="range" data-css="'+v[0]+'" min="'+v[2]+'" max="'+v[3]+'" step="'+v[4]+'" value="'+v[5]+'">';
            slidersDiv.appendChild(g);
        });

        var texGrid = document.getElementById('texture-grid');
        texNames.forEach(function(name) {
            var item = document.createElement('div'); item.className = 'texture-item';
            item.style.backgroundImage = 'url(assets/'+name+'.png)';
            texGrid.appendChild(item);
        });

        document.querySelectorAll('input[type="range"]').forEach(function(s) {
            s.addEventListener('input', function() {
                var v = parseFloat(s.value);
                document.documentElement.style.setProperty(s.dataset.css, v);
                var valEl = document.getElementById('val'+s.dataset.css);
                if (valEl) valEl.textContent = v;
                updateCssOutput();
            });
        });

        document.getElementById('reset-btn').addEventListener('click', function() {
            cssVars.forEach(function(v) {
                document.documentElement.style.setProperty(v[0], v[5]);
                var slider = document.querySelector('input[data-css="'+v[0]+'"]');
                if (slider) slider.value = v[5];
                var valEl = document.getElementById('val'+v[0]);
                if (valEl) valEl.textContent = v[5];
            });
            document.getElementById('watermark-toggle').checked = true;
            document.getElementById('watermark').classList.remove('hidden');
            updateCssOutput();
        });

        var toggleBtn = document.getElementById('toolbar-toggle');
        var panelEl = document.getElementById('toolbar-panel');
        var closeBtn = document.getElementById('toolbar-close');
        var watermark = document.getElementById('watermark');
        var watermarkToggle = document.getElementById('watermark-toggle');

        watermarkToggle.addEventListener('change', function() {
            if (this.checked) {
                watermark.classList.remove('hidden');
            } else {
                watermark.classList.add('hidden');
            }
        });

        var hideTimeout;
        var HIDE_DELAY = 5000;

        function showButton() {
            toggleBtn.classList.remove('hidden');
            resetHideTimer();
        }

        function hideButton() {
            if (panelEl.classList.contains('open')) return;
            toggleBtn.classList.add('hidden');
        }

        function resetHideTimer() {
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hideButton, HIDE_DELAY);
        }

        document.addEventListener('mousemove', function(e) {
            showButton();
            if (panelEl.contains(e.target) || e.target === toggleBtn) {
                clearTimeout(hideTimeout);
            }
        });

        document.addEventListener('mouseleave', function() {
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(hideButton, 1000);
        });

        resetHideTimer();

        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            panelEl.classList.toggle('open');
            if (panelEl.classList.contains('open')) {
                updateCssOutput();
                clearTimeout(hideTimeout);
            } else {
                resetHideTimer();
            }
        });

        closeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            panelEl.classList.remove('open');
            resetHideTimer();
        });

        document.addEventListener('click', function(e) {
            if (!panelEl.contains(e.target) && e.target !== toggleBtn) {
                panelEl.classList.remove('open');
                resetHideTimer();
            }
        });

        panelEl.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        panelEl.addEventListener('mouseenter', function() {
            clearTimeout(hideTimeout);
        });
        panelEl.addEventListener('mouseleave', function() {
            if (!panelEl.classList.contains('open')) {
                resetHideTimer();
            }
        });

        function updateCssOutput() {
            var css = ':root {\n';
            cssVars.forEach(function(v) {
                var val = getComputedStyle(document.documentElement).getPropertyValue(v[0]).trim();
                css += '  ' + v[0] + ': ' + val + ';\n';
            });
            css += '}\n#toolbar-toggle, #toolbar-panel { display: none !important; }';
            if (!watermarkToggle.checked) {
                css += '\n#watermark { display: none !important; }';
            }
            document.getElementById('css-code').textContent = css;
        }

        document.getElementById('copy-css-btn').addEventListener('click', function() {
            var cssText = document.getElementById('css-code').textContent;
            navigator.clipboard.writeText(cssText).then(function() {
                var btn = document.getElementById('copy-css-btn');
                btn.textContent = 'Скопировано';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Копировать';
                    btn.classList.remove('copied');
                }, 2000);
            });
        });

        updateCssOutput();
    </script>
</body>
</html>
