<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VulkanLight — Галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            color: #e0e0e0;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6600, #ff2200);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .card .info {
            padding: 0.75rem 1rem;
        }
        .card .filename {
            font-size: 0.8rem;
            color: #ff884d;
            font-family: monospace;
            word-break: break-all;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal.active {
            display: flex;
        }
        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: #555;
            font-size: 0.8rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔥 VulkanLight</h1>
    <p>Галерея скриншотов | Автообновление из папки images</p>
</div>

<div class="gallery" id="gallery">
    <div class="loading">📡 Загрузка списка изображений...</div>
</div>

<div class="footer">
    VulkanLight — легковесная сборка на VulkanMod
</div>

<div class="modal" id="modal">
    <img id="modalImage" alt="Preview">
</div>

<script>
    async function loadGallery() {
        const gallery = document.getElementById('gallery');
        
        try {
            // Загружаем список из images.json
            const response = await fetch('images.json');
            if (!response.ok) throw new Error('Нет images.json');
            const images = await response.json();
            
            if (images.length === 0) {
                gallery.innerHTML = '<div class="loading">📭 Нет фото в папке images/</div>';
                return;
            }
            
            gallery.innerHTML = images.map(path => {
                const filename = path.split('/').pop();
                return `
                    <div class="card" data-url="${path}">
                        <img src="${path}" loading="lazy" alt="${filename}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23333%22%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23666%22%3E❌%3C/text%3E%3C/svg%3E'">
                        <div class="info">
                            <div class="filename">📷 ${filename}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Обработчики кликов
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const url = card.dataset.url;
                    document.getElementById('modalImage').src = url;
                    document.getElementById('modal').classList.add('active');
                });
            });
            
        } catch (err) {
            gallery.innerHTML = '<div class="loading">⚠️ Ошибка: нет images.json. Сделай push в ветку main, GitHub Action создаст файл.</div>';
            console.error(err);
        }
    }
    
    // Закрытие модалки
    document.getElementById('modal').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('active');
    });
    document.getElementById('modalImage').addEventListener('click', (e) => e.stopPropagation());
    
    loadGallery();
</script>
</body>
</html>
