<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MrPack → ZIP конвертер</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; text-align: center; }
        .dropzone { border: 3px dashed #aaa; border-radius: 20px; padding: 40px; background: #fafafa; cursor: pointer; }
        .dropzone:hover { background: #eef; border-color: #66f; }
        button { margin-top: 20px; padding: 15px 40px; font-size: 18px; background: #4caf50; color: white; border: none; border-radius: 10px; cursor: pointer; display: none; }
        button:hover { background: #45a049; }
        #status { margin-top: 15px; color: #666; }
        a { color: #2196f3; }
    </style>
</head>
<body>
    <h2>🎮 MrPack → ZIP (для стримера)</h2>
    <div class="dropzone" id="dropzone">
        <p>📁 Перетащи .mrpack сюда<br>или кликни чтобы выбрать</p>
        <input type="file" id="fileInput" accept=".mrpack" style="display: none;">
    </div>
    <button id="convertBtn">⚡ Конвертировать и скачать</button>
    <div id="status"></div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        let selectedFile = null;

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = '#eef'; });
        dropzone.addEventListener('dragleave', () => dropzone.style.background = '#fafafa');
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.background = '#fafafa';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.mrpack')) { setFile(file); }
            else { statusDiv.innerHTML = '❌ Только .mrpack файлы!'; }
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) { setFile(file); }
        });

        function setFile(file) {
            selectedFile = file;
            dropzone.innerHTML = `<p>✅ Выбран: <strong>${file.name}</strong><br><small>${(file.size/1024).toFixed(1)} КБ</small></p>`;
            convertBtn.style.display = 'block';
            statusDiv.innerHTML = '';
        }

        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            statusDiv.innerHTML = '⏳ Обработка...';
            
            try {
                const zip = await JSZip.loadAsync(selectedFile);
                
                // Создаём новый ZIP, куда положим всё содержимое mrpack
                const outZip = new JSZip();
                
                // Копируем ВСЕ файлы из mrpack в корень нового zip
                const promises = [];
                zip.forEach((relativePath, file) => {
                    if (!file.dir) {
                        promises.push(
                            file.async('blob').then(data => {
                                outZip.file(relativePath, data);
                            })
                        );
                    }
                });
                
                await Promise.all(promises);
                
                // Генерируем ZIP и скачиваем
                const content = await outZip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.mrpack', '.zip');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusDiv.innerHTML = '✅ Готово! ZIP скачан.';
            } catch (err) {
                statusDiv.innerHTML = '❌ Ошибка: ' + err.message;
            }
        });
    </script>
    <hr>
    <p style="font-size: 12px; color: #999;">Просто перетащи .mrpack → нажми кнопку → получи .zip<br>Внутри ZIP будут папки mods, config и manifest.json</p>
</body>
</html>
