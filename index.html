<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>mrpack → zip</title>
    <style>
        body { background: #1a1a1a; color: #ddd; font-family: monospace; max-width: 600px; margin: 20px auto; padding: 15px; }
        .zone { border: 2px dashed #555; background: #222; padding: 30px; text-align: center; cursor: pointer; border-radius: 8px; }
        .zone:hover { border-color: #888; background: #2a2a2a; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; width: 100%; margin: 15px 0; }
        button:enabled { background: #4caf50; border-color: #4caf50; color: #000; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        progress { width: 100%; height: 20px; border-radius: 0; background: #333; }
        progress::-webkit-progress-bar { background: #333; }
        progress::-webkit-progress-value { background: #4caf50; }
        #log { background: #111; padding: 10px; height: 180px; overflow-y: auto; font-size: 12px; border: 1px solid #333; margin-top: 15px; }
        .info { color: #aaa; }
        .ok { color: #4caf50; }
        .err { color: #f44336; }
        input { display: none; }
    </style>
</head>
<body>
    <h3>📦 MRPACK → CLEAN ZIP</h3>
    <div class="zone" id="zone">Перетащи .mrpack или кликни</div>
    <input type="file" id="fileInput" accept=".mrpack">
    <div id="info"></div>
    <button id="buildBtn" disabled>Собрать архив</button>
    <progress id="progress" value="0" max="100" style="display:none;"></progress>
    <div id="log"></div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        const zone = document.getElementById('zone');
        const input = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const btn = document.getElementById('buildBtn');
        const prog = document.getElementById('progress');
        const logDiv = document.getElementById('log');

        let pack = null;

        function log(msg, cls='info') {
            const d = document.createElement('div');
            d.className = cls;
            d.textContent = `> ${msg}`;
            logDiv.appendChild(d);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        zone.addEventListener('click', () => input.click());
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const f = e.dataTransfer.files[0];
            if (f?.name.endsWith('.mrpack')) load(f);
        });
        input.addEventListener('change', e => {
            if (e.target.files[0]) load(e.target.files[0]);
        });

        async function load(f) {
            info.textContent = `📁 ${f.name} (${(f.size/1024).toFixed(0)}kb)`;
            btn.disabled = true;
            log(`Чтение ${f.name}`, 'info');
            try {
                const zip = await JSZip.loadAsync(f);
                const mf = zip.file("modrinth.index.json");
                if(!mf) throw new Error('modrinth.index.json не найден');
                const manifest = JSON.parse(await mf.async("string"));
                pack = { zip, manifest };
                log(`Найдено модов: ${manifest.files?.length || 0}`, 'ok');
                btn.disabled = false;
            } catch(e) {
                log(`Ошибка: ${e.message}`, 'err');
            }
        }

        btn.addEventListener('click', async () => {
            if(!pack) return;
            btn.disabled = true;
            prog.style.display = 'block';
            prog.value = 0;
            logDiv.innerHTML = '';
            log('Старт сборки...', 'ok');

            const out = new JSZip();
            const files = pack.manifest.files || [];
            const total = files.length;
            let ok = 0, fail = 0;

            for(let i=0; i<files.length; i++) {
                const m = files[i];
                prog.value = ((i+1)/total)*100;
                
                if(m.env?.client === 'unsupported') {
                    log(`Пропущен (server): ${m.path}`, 'info');
                    continue;
                }
                try {
                    const url = m.downloads?.[0];
                    if(!url) throw new Error('Нет ссылки');
                    log(`Загрузка: ${m.path.split('/').pop()}`, 'info');
                    const res = await fetch(url);
                    if(!res.ok) throw new Error(`HTTP ${res.status}`);
                    out.file(m.path, await res.blob());
                    ok++;
                } catch(e) {
                    log(`Ошибка: ${m.path} - ${e.message}`, 'err');
                    fail++;
                }
            }

            log('Копирование конфигов (overrides)...', 'info');
            for(let [p, f] of Object.entries(pack.zip.files)) {
                if(p.startsWith('overrides/') && !f.dir) {
                    const target = p.replace('overrides/', '');
                    out.file(target, await f.async('blob'));
                    log(`  ${target}`, 'ok');
                }
            }

            log(`Упаковка ZIP... (успешно: ${ok}, ошибок: ${fail})`, 'ok');
            const blob = await out.generateAsync({type:'blob'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = pack.manifest.name?.replace(/[^a-z0-9]/gi,'_') || 'pack';
            a.download += '.zip';
            a.click();
            URL.revokeObjectURL(url);
            
            prog.style.display = 'none';
            btn.disabled = false;
            log('Готово!', 'ok');
        });
    </script>
</body>
</html>
