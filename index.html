<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зашифрованная галерея</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        select, button { padding: 10px 20px; background: #1e1e1e; color: white; border: 1px solid #333; border-radius: 8px; cursor: pointer; }
        button:hover { background: #333; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; border: 1px solid #222; }
        .card:hover { transform: scale(1.02); }
        .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #1a1a1a; }
        .card-info { padding: 12px; }
        .card-title { font-weight: bold; margin-bottom: 5px; }
        .card-meta { font-size: 12px; color: #888; }
        .unlisted-badge { background: #ff4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-left: 8px; }
        .password-prompt { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box { background: #1e1e1e; padding: 30px; border-radius: 16px; text-align: center; }
        .password-box input { padding: 10px; margin: 10px; border-radius: 8px; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 Зашифрованная галерея</h1>
    <div class="controls">
        <select id="categoryFilter">
            <option value="all">Все категории</option>
        </select>
        <button id="decryptAllBtn">🔓 Расшифровать всё (ввести пароль)</button>
    </div>
    <div id="gallery" class="gallery"></div>
</div>
<script src="crypto-helper.js"></script>
<script src="script.js"></script>
</body>
</html>
