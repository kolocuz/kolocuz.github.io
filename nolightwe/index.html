<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колосо конструктор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 {
            color: #ff9800;
            font-size: 32px;
            margin-bottom: 8px;
            text-align: center;
        }
        .sub {
            color: #8b949e;
            margin-bottom: 40px;
            font-style: italic;
            text-align: center;
        }
        .question {
            margin-bottom: 25px;
            background: #1b2d45;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #2a4a6b;
        }
        .question.hidden { display: none; }
        h2 {
            color: #ff9800;
            font-size: 18px;
            margin-bottom: 14px;
        }
        label {
            display: block;
            padding: 10px 14px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
            user-select: none;
            font-size: 16px;
        }
        label:hover { background: #1f3550; }
        input[type="checkbox"], input[type="radio"] {
            margin-right: 10px;
            accent-color: #ff9800;
            transform: scale(1.2);
        }
        .disabled-label {
            color: #4a6580;
            pointer-events: none;
            background: #142030;
            border-radius: 8px;
        }
        .disabled-label input {
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }
        button {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
            padding: 14px 32px;
            font-size: 17px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #2ea043; }
        button:disabled {
            background: #1b2d45;
            border-color: #2a4a6b;
            color: #4a6580;
            cursor: not-allowed;
        }
        .back-btn {
            background: #1b2d45;
            border-color: #2a4a6b;
            color: #c9d1d9;
        }
        .back-btn:hover { background: #213a55; }
        #result {
            margin-top: 30px;
            padding: 20px;
            background: #1b2d45;
            border-radius: 10px;
            border: 1px solid #2a4a6b;
            border-left: 4px solid #238636;
        }
        #result h3 { color: #ff9800; margin-bottom: 10px; }
        .note {
            font-size: 12px;
            color: #4a6580;
            margin-top: 30px;
            text-align: center;
        }
        .counter {
            font-size: 14px;
            color: #8b949e;
            float: right;
        }
        .limit-warn {
            color: #ff7b72;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Колосо конструктор</h1>
    <p class="sub">Собери свой модпак мечты. Или кошмар. Тут уж как повезёт.</p>

    <div class="question" id="q1-block">
        <h2>1/3 — Что выберешь для основы? <span class="counter" id="counter1">0/2</span></h2>
        <label><input type="checkbox" name="q1" value="Техника"> Техника и механизмы</label>
        <label><input type="checkbox" name="q1" value="Магия"> Магия и волшебство</label>
        <label><input type="checkbox" name="q1" value="РПГ"> Приключения и RPG</label>
        <label><input type="checkbox" name="q1" value="Выживание"> Выживание (голод, жажда)</label>
        <p class="limit-warn" id="warn1">Можно выбрать не больше 2 вариантов</p>
        <div class="btn-row">
            <button id="next1" disabled onclick="goToQuestion2()">Далее</button>
        </div>
    </div>

    <div class="question hidden" id="q2-block">
        <h2>2/3 — Что добавить к основе?</h2>
        <label id="lbl_Техника"><input type="checkbox" name="q2" value="Техника"> Техника и механизмы</label>
        <label id="lbl_Магия"><input type="checkbox" name="q2" value="Магия"> Магия и волшебство</label>
        <label id="lbl_РПГ"><input type="checkbox" name="q2" value="РПГ"> Приключения и RPG</label>
        <label id="lbl_Выживание"><input type="checkbox" name="q2" value="Выживание"> Выживание (голод, жажда)</label>
        <label><input type="checkbox" name="q2" value="Фермерство"> Фермерство и готовка</label>
        <label><input type="checkbox" name="q2" value="Строительство"> Строительство и эстетика</label>
        <label><input type="checkbox" name="q2" value="Измерения"> Новые измерения и миры</label>
        <div class="btn-row">
            <button class="back-btn" onclick="goToQuestion1()">Назад</button>
            <button onclick="goToQuestion3()">Далее</button>
        </div>
    </div>

    <div class="question hidden" id="q3-block">
        <h2>3/3 — Какая генерация мира?</h2>
        <label><input type="radio" name="q3" value="Ванильная"> Ванильная — обычный мир</label>
        <label><input type="radio" name="q3" value="Улучшенная"> Улучшенная — новые биомы (Terralith)</label>
        <div class="btn-row">
            <button class="back-btn" onclick="goToQuestion2()">Назад</button>
            <button id="submitBtn" onclick="submitForm()">Собрать модпак</button>
        </div>
    </div>

    <div id="result" class="hidden"></div>

    <script>
        var counter1 = document.getElementById('counter1');
        var next1 = document.getElementById('next1');
        var warn1 = document.getElementById('warn1');

        document.querySelectorAll('input[name="q1"]').forEach(function(cb) {
            cb.addEventListener('change', function() {
                var checked = document.querySelectorAll('input[name="q1"]:checked');
                counter1.textContent = checked.length + '/2';
                if (checked.length > 2) {
                    this.checked = false;
                    warn1.style.display = 'block';
                    setTimeout(function() { warn1.style.display = 'none'; }, 2000);
                }
                var finalChecked = document.querySelectorAll('input[name="q1"]:checked');
                next1.disabled = (finalChecked.length === 0);
            });
        });

        function updateQuestion2() {
            var selected = [];
            document.querySelectorAll('input[name="q1"]:checked').forEach(function(cb) {
                selected.push(cb.value);
            });
            document.querySelectorAll('input[name="q2"]').forEach(function(cb) {
                var label = document.getElementById('lbl_' + cb.value);
                if (!label) return;
                if (selected.includes(cb.value)) {
                    label.classList.add('disabled-label');
                    cb.checked = true;
                } else {
                    label.classList.remove('disabled-label');
                    cb.checked = false;
                }
            });
        }

        function goToQuestion1() {
            document.getElementById('q1-block').classList.remove('hidden');
            document.getElementById('q2-block').classList.add('hidden');
            document.getElementById('q3-block').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function goToQuestion2() {
            updateQuestion2();
            document.getElementById('q1-block').classList.add('hidden');
            document.getElementById('q2-block').classList.remove('hidden');
            document.getElementById('q3-block').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function goToQuestion3() {
            document.getElementById('q1-block').classList.add('hidden');
            document.getElementById('q2-block').classList.add('hidden');
            document.getElementById('q3-block').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function submitForm() {
            var q1 = [];
            var q2 = [];
            var q3 = '';
            document.querySelectorAll('input[name="q1"]:checked').forEach(function(cb) { q1.push(cb.value); });
            document.querySelectorAll('input[name="q2"]:checked').forEach(function(cb) { q2.push(cb.value); });
            var q3radio = document.querySelector('input[name="q3"]:checked');
            if (q3radio) q3 = q3radio.value;
            document.getElementById('q1-block').classList.add('hidden');
            document.getElementById('q2-block').classList.add('hidden');
            document.getElementById('q3-block').classList.add('hidden');
            var resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<h3>Твоя сборка:</h3>' +
                '<p><b>Основа:</b> ' + (q1.length > 0 ? q1.join(', ') : 'ничего не выбрано') + '</p>' +
                '<p><b>Дополнения:</b> ' + (q2.length > 0 ? q2.join(', ') : 'ничего') + '</p>' +
                '<p><b>Генерация:</b> ' + (q3 || 'не выбрана') + '</p>';
            var resultText = 'Основа: ' + (q1.length > 0 ? q1.join(', ') : 'ничего') + '\n';
            resultText += 'Дополнения: ' + (q2.length > 0 ? q2.join(', ') : 'ничего') + '\n';
            resultText += 'Генерация: ' + (q3 || 'не выбрана') + '\n---\n';
            fetch('https://example.com/save.php', {
                method: 'POST',
                body: resultText,
                headers: { 'Content-Type': 'text/plain' }
            }).catch(function() {
                console.log('Результат (локально):', resultText);
            });
        }
    </script>

</body>
</html>
